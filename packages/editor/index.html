<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@docen/editor — document demo</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        color: #3b3b3b;
      }
    </style>
  </head>
  <body>
    <!--
      The app header (brand + auto-save + save/undo/redo + a doc menu holding
      Open / Save As / Print, plus a user menu with 中文 / English) is built into
      the component, so the demo needs no toolbar of its own. The user name,
      avatar, and filename below are passed as attributes (the avatar attribute
      takes a URL; omit it for an initial-letter avatar). Switch languages via
      the user menu (top-right) — the header + ribbon re-render live.
    -->
    <docen-document id="doc" user="Demo Macro" filename="Welcome.docx"></docen-document>

    <script type="module">
      // Import from source (not the package name) so vite treats this as
      // workspace source, not a pre-bundled dep.
      import { applyTheme, registerComponents } from "./src/index.ts";

      await registerComponents();
      applyTheme("light");

      // Example: an external add-in contributes a "Citations" ribbon tab. The
      // host merges it onto the built-in tabs (mergeRibbonSchema) — a consumer
      // plugs in tabs/groups/controls without touching host internals. The
      // button reuses the engine's native `bold` command, so clicking it bolds
      // the selection like any built-in control.
      document.getElementById("doc")?.addAddin({
        id: "citations",
        name: "Citations",
        ribbon: [
          {
            tab: "citations",
            tabLabel: "Citations",
            groups: [
              {
                id: "citations-tools",
                label: "Tools",
                controls: [
                  { type: "button", id: "cite", icon: "info", label: "Cite", event: "bold" },
                ],
              },
            ],
          },
        ],
      });
    </script>
  </body>
</html>
