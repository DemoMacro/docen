<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@docen/editor — document demo</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        font-family:
          "Segoe UI",
          system-ui,
          -apple-system,
          sans-serif;
        color: #3b3b3b;
      }
    </style>
  </head>
  <body>
    <!--
      The app header (brand + auto-save + save/undo/redo + a doc menu holding
      Open / Save As / Print, plus a user menu with 中文 / English) is built into
      the component, so the demo needs no toolbar of its own. The user name,
      avatar, and filename below are passed as attributes (the avatar attribute
      takes a URL; omit it for an initial-letter avatar). Switch languages via
      the user menu (top-right) — the header + ribbon re-render live.
    -->
    <docen-document
      id="doc"
      user="Demo Macro"
      filename="Welcome.docx"
      navigation-pane
    ></docen-document>

    <script type="module">
      // Import from source (not the package name) so vite treats this as
      // workspace source, not a pre-bundled dep.
      import { applyTheme, registerComponents } from "./src/index.ts";

      await registerComponents();
      applyTheme("light");

      // Example: an external add-in contributes an "About" ribbon tab. The host
      // merges it onto the built-in tabs (mergeRibbonSchema) — labels are i18n
      // keys, and the addin ships its own `translations`, which the host
      // registers on addAddin (merged with the built-in ribbon.* keys) so the
      // tab/group/button localize on every locale switch. The "Help" button's
      // `open-help` event isn't a Tiptap command, so the host routes it to this
      // addin's `commands` map — clicking it opens the project's GitHub repo.
      document.getElementById("doc")?.addAddin({
        id: "about",
        ribbon: [
          {
            tab: "about",
            label: "about.tab",
            groups: [
              {
                id: "about-help",
                label: "about.group.help",
                controls: [
                  { type: "button", id: "help", label: "about.cmd.help", event: "open-help" },
                ],
              },
            ],
          },
        ],
        translations: [
          {
            $code: "en",
            "about.tab": "About",
            "about.group.help": "Help",
            "about.cmd.help": "Help",
          },
          {
            $code: "zh-CN",
            "about.tab": "关于",
            "about.group.help": "帮助",
            "about.cmd.help": "帮助",
          },
        ],
        commands: {
          "open-help": () => window.open("https://github.com/DemoMacro/docen", "_blank"),
        },
      });

      // Example: an external add-in contributes a mini-toolbar button (the
      // selection floating toolbar). The host merges it onto the built-in
      // buttons (mergeMiniToolbar) — and re-merges at runtime since addAddin
      // runs after boot (the bar's buttons are @observable, so no re-mount
      // needed). The "highlight" event routes to editor.commands.highlight,
      // exactly like a ribbon button.
      document.getElementById("doc")?.addAddin({
        id: "mini-toolbar-demo",
        miniToolbar: [
          {
            icon: "highlight",
            event: "highlight",
            label: "ribbon.cmd.highlight",
            activeMark: "highlight",
          },
        ],
      });
    </script>
  </body>
</html>
